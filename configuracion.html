<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuración — myTeacher</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="Style/panel.css">
  <link rel="stylesheet" href="Style/configuracion.css">
</head>
<body data-page="configuracion">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="mainSidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-person-chalkboard"></i>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="panel_estudiante.html" data-page="inicio">
        <i class="fa-solid fa-house"></i> Inicio
      </a>
      <a class="nav-item" href="perfil_tutor.html" data-page="tutores">
        <i class="fa-solid fa-chalkboard-user"></i> Tutores
      </a>
      <a class="nav-item" href="mis_tutorias.html" data-page="mis-tutorias">
        <i class="fa-solid fa-calendar-check"></i> Mis tutorias
      </a>
      <a class="nav-item" href="comunidad.html" data-page="comunidad">
        <i class="fa-solid fa-users"></i> Comunidad
      </a>
      <a class="nav-item" href="favoritos.html" data-page="favoritos">
        <i class="fa-solid fa-heart"></i> Favoritos
      </a>
      <a class="nav-item active" href="configuracion.html" data-page="configuracion" style="margin-top:auto;">
        <i class="fa-solid fa-gear"></i> Configuracion
      </a>
    </nav>
  </aside>

  <!-- HEADER -->
  <header class="header">
    <button class="hamburger-btn" id="hamburgerBtn">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="header-brand">
      <span class="leaf">🌿</span>
      <span><em>my</em>Teacher</span>
    </div>
    <div class="header-search">
      <i class="fa-solid fa-magnifying-glass" style="color:#9ca3af;font-size:.85rem;"></i>
      <input type="text" placeholder="Buscar....">
      <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <div class="header-right">
      <button class="notif-btn">
        <i class="fa-regular fa-bell"></i>
        <span class="notif-dot"></span>
      </button>
      <div style="position:relative;">
        <button class="user-btn" id="userBtn">
          <div class="user-avatar">
            <img id="headerAvatar" src="images/choi.png" alt="User" onerror="this.style.display='none';this.parentNode.textContent='CS'">
          </div>
          <span id="userName">Choi san</span>
          <i class="fa-solid fa-chevron-down" style="font-size:.7rem;color:#9ca3af;"></i>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a class="dropdown-item" href="perfil_estudiante.html"><i class="fa-regular fa-user"></i> Mi perfil</a>
          <hr class="dropdown-divider">
          <a class="dropdown-item danger" href="login.html" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main-wrapper">
    <main class="main-content">

      <!-- CARD PRINCIPAL -->
      <div class="config-card">

        <!-- TÍTULO -->
        <h2 class="config-titulo">Información del Perfil</h2>

        <!-- FILA: FOTO + BOTONES + BOTÓN EDITAR -->
        <div class="config-foto-fila">
          <div class="foto-circulo" id="fotoCirculo">
            <img id="fotoPreview" src="images/choi.png" alt="Foto de perfil"
                 onerror="this.style.display='none';document.getElementById('fotoInicial').style.display='flex'">
            <div id="fotoInicial" class="foto-iniciales" style="display:none;">CS</div>
          </div>
          <input type="file" id="fotoInput" accept="image/*" style="display:none;">

          <label for="fotoInput" class="btn-foto-accion btn-subir">
            Subir nueva foto
          </label>
          <button class="btn-foto-accion btn-borrar" id="btnBorrarFoto">
            Borrar <i class="fa-regular fa-trash-can"></i>
          </button>

          <button class="btn-editar-config" id="btnEditar">
            <i class="fa-regular fa-pen-to-square"></i> Editar
          </button>
        </div>

        <!-- Separador -->
        <hr class="config-hr">

        <!-- Mensaje validación -->
        <div class="validacion-msg" id="validacionMsg" style="display:none;"></div>

        <!-- GRID: datos personales | separador | seguridad -->
        <div class="config-datos-grid">

          <!-- COLUMNA IZQUIERDA -->
          <div class="col-datos">
            <h4 class="col-titulo">Datos personales</h4>

            <div class="campos-fila">
              <div class="campo-grupo">
                <label class="campo-label">Nombre</label>
                <input type="text" class="campo-input" id="inputNombre" value="Choi" disabled>
              </div>
              <div class="campo-grupo">
                <label class="campo-label">Apellido</label>
                <input type="text" class="campo-input" id="inputApellido" value="San" disabled>
              </div>
            </div>

            <div class="campos-fila">
              <div class="campo-grupo">
                <label class="campo-label">Teléfono</label>
                <input type="tel" class="campo-input" id="inputTelefono" value="3333333333" disabled>
              </div>
              <div class="campo-grupo">
                <label class="campo-label">Email</label>
                <input type="email" class="campo-input" id="inputEmail" value="sanuwu@gmail.com" disabled>
              </div>
            </div>

            <div class="campos-fila">
              <div class="campo-grupo campo-grupo--mitad">
                <label class="campo-label">Fecha de nacimiento</label>
                <input type="date" class="campo-input" id="inputFecha" value="1999-07-10" disabled>
              </div>
            </div>

            <div class="eliminar-zona">
              <button class="btn-eliminar-cuenta" id="btnEliminarCuenta">
                Eliminar cuenta
              </button>
            </div>
          </div>

          <!-- SEPARADOR VERTICAL -->
          <div class="separador-vertical"></div>

          <!-- COLUMNA DERECHA: Seguridad -->
          <div class="col-seguridad">
            <h4 class="col-titulo">Seguridad de la cuenta</h4>

            <div class="campo-grupo">
              <label class="campo-label">Contraseña</label>
              <div class="password-wrapper">
                <input type="password" class="campo-input" id="inputPassword"
                       value="mipassword123" disabled readonly>
                <button class="toggle-password" id="togglePassword" type="button">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <button class="btn-cambiar-pass" type="button">
              Cambiar contraseña
            </button>
          </div>

        </div><!-- /config-datos-grid -->

      </div><!-- /config-card -->

    </main>
  </div>

  <!-- Modal eliminar cuenta -->
  <div class="modal-overlay" id="modalEliminar" style="display:none;">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <h3 class="modal-titulo">¿Eliminar cuenta?</h3>
      <p class="modal-desc">Esta acción es permanente. Todos tus datos, tutorias y progreso se perderán para siempre.</p>
      <div class="modal-btns">
        <button class="btn-modal-cancel" id="btnCancelarEliminar">Cancelar</button>
        <button class="btn-modal-confirm" id="btnConfirmarEliminar">Sí, eliminar</button>
      </div>
    </div>
  </div>

  <script src="scripts/panel_common.js"></script>
  <script src="scripts/configuracion.js"></script>
</body>
</html>
