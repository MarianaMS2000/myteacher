<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — myTeacher</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/Style/login.css" />
</head>

<!--
  ========================================================
-->
<body style="background-image: url('images/paisajelogin.jpg');">

  <!-- ── NAV FLOTANTE ─────────────────────────────────── -->
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="#">Sobre Nosotros</a></li>
    </ul>
    <img src="images/LOGOTEACHER.png" alt="myTeacher" class="nav-logo">
  </nav>

  <!-- ── LOGIN ─────────────────────────────────────────── -->
  <div class="login-page">
    <div class="login-wrapper">

      <!-- Card -->
      <div class="login-card">
        <h2 class="login-title">Bienvenido<br>devuelta!</h2>
        <hr class="login-hr">

        <form id="login-form" novalidate>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" autocomplete="email" placeholder="tucorreo@ejemplo.com">
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
          </div>
          <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>

        <div class="login-footer">
          <span>¿No tienes una cuenta?</span>
          <a href="registro.html" class="btn-registrate">REGÍSTRATE</a>
        </div>
      </div>

      <!-- ── MASCOTA / AVIÓN ──────────────────────────── -->
      <!-- Cambia src="images/apple-plane.png" por tu imagen -->
      <div class="apple-plane">
        <img src="images/appleavion.png" alt="mascota myTeacher">
      </div>

    </div>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    if (loginForm) {
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = loginForm.querySelector('input[name="email"]').value.trim();
        const pass  = loginForm.querySelector('input[name="password"]').value;
        if (!email || !pass) {
          loginForm.classList.add('shake');
          setTimeout(() => loginForm.classList.remove('shake'), 400);
          return;
        }
        const name = email.split('@')[0].replace(/[._]/g, ' ');
        localStorage.setItem('mt_user', JSON.stringify({
          nombre: name.charAt(0).toUpperCase() + name.slice(1),
          email,
          rol: 'estudiante'
        }));
        const btn = loginForm.querySelector('.btn-login');
        btn.textContent = '✓ Entrando...';
        btn.style.background = '#3a7a28';
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
      });
    }
  </script>
</body>
</html>
